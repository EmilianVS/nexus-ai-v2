version: '3.9'
services:
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    restart: unless-stopped

  backend:
    build: ./backend
    ports: ['8000:8000']
    env_file: ./backend/.env
    depends_on: [redis]
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes: ['./frontend:/app']
    command: sh -c 'npm install && npm run dev'
    ports: ['3000:3000']
    env_file: ./frontend/.env.local
    depends_on: [backend]
    restart: unless-stopped
